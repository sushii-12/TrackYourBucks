{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="tyb-card tyb-main-card">
      <h4 class="mb-3 text-light">Add Transaction</h4>
      <p class="mb-4" style="color:#32ff7e;">
        Log your income or expense and keep TrackYourBucks up to date.
      </p>

      <form method="post" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Type</label>
          <select class="form-select" name="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Amount</label>
          <input
            type="number"
            step="0.01"
            class="form-control"
            name="amount"
            placeholder="Eg: 499.99"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Category</label>
          <input
            type="text"
            class="form-control"
            name="category"
            placeholder="Eg: Food, Rent, Salary"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" name="date" value="{{ today }}" />
        </div>

        <div class="mb-3">
          <label class="form-label">Note (optional)</label>
          <textarea
            class="form-control"
            name="note"
            rows="2"
            placeholder="Eg: Dinner with friends"
          ></textarea>
        </div>

        <div class="d-flex align-items-center gap-2 mt-3">
          <button type="submit" class="btn btn-primary px-4">
            Save
          </button>
          <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
